services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snep
      POSTGRES_PASSWORD: snep
      POSTGRES_DB: snep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snep"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn snep.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ssh_data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  ssh:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m snep.ssh.server
    ports:
      - "10000-10099:10000-10099"
    volumes:
      - ./backend:/app
      - ssh_data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  snmp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m snep.snmp.server
    ports:
      - "20000-20099:20000-20099/udp"
    volumes:
      - ./backend:/app
      - ssh_data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  ssh_data:
